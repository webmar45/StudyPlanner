spring.application.name=smart-study-planner
server.port=${PORT:8080}

# Override in production: MONGODB_URI, JWT_SECRET, OPENAI_API_KEY, YOUTUBE_API_KEY
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/smart_study_planner}

app.jwt.secret=${JWT_SECRET:dev-only-change-me-before-production}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Optional OpenAI key for /api/llm/weekly-summary (template fallback if empty)
app.openai.api-key=${OPENAI_API_KEY:}
app.openai.model=${OPENAI_MODEL:gpt-4o-mini}

# Optional YouTube Data API v3 key for task learning-resources (videos only; Wikipedia works without a key)
app.youtube.api-key=${YOUTUBE_API_KEY:}
