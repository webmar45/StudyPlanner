# Render Blueprint: https://render.com/docs/blueprint-spec
# Connect repo in Render Dashboard → New → Blueprint → select this file.
services:
  - type: web
    name: smart-study-planner-api
    runtime: java
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/backend-1.0.0.jar
    healthCheckPath: /api/health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
        optional: true
      - key: YOUTUBE_API_KEY
        sync: false
        optional: true
